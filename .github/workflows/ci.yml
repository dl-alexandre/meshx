name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  MIX_ENV: test

jobs:
  test:
    name: Format, Compile, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up BEAM
        uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"

      - name: Restore dependencies and build cache
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Check formatting
        run: mix format --check-formatted

      - name: Compile with warnings as errors
        run: mix compile --warnings-as-errors

      - name: Validate BlueZ BLE bridge
        run: |
          python3 -m pip install dbus-next
          python3 -m py_compile apps/mob_routing_ble/priv/bin/mob_bluez_bridge
          python3 apps/mob_routing_ble/priv/bin/mob_bluez_bridge --self-test --require-dbus-next

      # Fail fast before the full suite: catches silent production wiring bugs
      # (adapter env drift, router transport not attached, chat ingress gaps).
      - name: MobNode mesh and chat wiring guardrails
        run: >
          mix test
          apps/mob_node/test/mob_node/production_wiring_test.exs
          apps/mob_node/test/mob_node/mesh_status_test.exs
          apps/mob_node/test/mob_node/chat/
          apps/mob_node/test/mob_node/mob_ble_transport_wiring_test.exs
          apps/mob_node/test/mob_node/ble/adapter_test.exs

      - name: Run tests
        run: mix test

      - name: Audit advert gossip scenarios
        run: mix mob.node.advert_gossip.audit apps/mob_node/test/fixtures/advert_gossip_scenarios

      - name: Generate mobile local release manifests
        run: |
          mix mob.node.local_readiness.audit --allow-open --out tmp/ci-local-readiness.json
          mix mob.node.local_completion.audit --allow-open | tee tmp/ci-local-completion-audit.txt
          mix mob.node.local_completion.audit --allow-open --json --out tmp/ci-local-completion-audit.json
          mix mob.node.local_completion.blocker_matrix --json --out tmp/ci-local-completion-blocker-matrix.json
          mix mob.node.remaining_items.audit --json --out tmp/ci-focused-remaining-items-audit.json
          mix mob.node.local_release.artifact_bundle --json --out tmp/ci-local-release-artifact-bundle.json
          mix mob.node.local_release.recent_evidence --json --out tmp/ci-local-release-recent-evidence.json
          mix mob.node.local_release.manifest --json --out tmp/ci-local-release.json
          mix run -e '
          readiness = "tmp/ci-local-readiness.json" |> File.read!() |> JSON.decode!()
          completion_audit = "tmp/ci-local-completion-audit.json" |> File.read!() |> JSON.decode!()
          blocker_matrix = "tmp/ci-local-completion-blocker-matrix.json" |> File.read!() |> JSON.decode!()
          focused_remaining_items = "tmp/ci-focused-remaining-items-audit.json" |> File.read!() |> JSON.decode!()
          artifact_bundle = "tmp/ci-local-release-artifact-bundle.json" |> File.read!() |> JSON.decode!()
          recent_evidence = "tmp/ci-local-release-recent-evidence.json" |> File.read!() |> JSON.decode!()
          release = "tmp/ci-local-release.json" |> File.read!() |> JSON.decode!()
          plain_completion_audit = File.read!("tmp/ci-local-completion-audit.txt")

          unless readiness["open_item_count"] == 10 do
            raise "unexpected local readiness open item count"
          end

          unless String.contains?(plain_completion_audit, "OPEN_ITEMS 10") do
            raise "plain completion audit must list open item count"
          end

          unless String.contains?(plain_completion_audit, "OPEN_ITEM objective=full_message_resolution status=blocked") do
            raise "plain completion audit must list blocked full message resolution"
          end

          unless String.contains?(plain_completion_audit, "OPEN_ITEM objective=release_hardening status=partial") do
            raise "plain completion audit must list partial release hardening"
          end

          unless completion_audit["completion_claim_allowed?"] == false do
            raise "local completion audit must not allow whole-project completion"
          end

          unless blocker_matrix["completion_claim_allowed?"] == false do
            raise "local blocker matrix must not allow whole-project completion"
          end

          unless focused_remaining_items["complete"] == false do
            raise "focused remaining-items audit must remain incomplete while AUX and upstream rows are blocked"
          end

          unless focused_remaining_items["completion_decision"]["update_goal_allowed"] == false do
            raise "focused remaining-items audit must not allow update_goal"
          end

          unless "extended_advertising_interop_aux_scan_response" in focused_remaining_items["incomplete_rows"] do
            raise "focused remaining-items audit must keep AUX scan-response row incomplete"
          end

          unless "upstreaming_mob_dev_mob_patches" in focused_remaining_items["completed_rows"] do
            raise "focused remaining-items audit must record upstream patch row complete after downstream migration"
          end

          unless artifact_bundle["release_candidate_complete?"] == false do
            raise "local release artifact bundle must keep release candidate completion open"
          end

          recent_artifact = Enum.find(artifact_bundle["artifacts"], &(&1["id"] == "recent_evidence_inventory"))

          unless "direct_full_mx_aux_complete" in recent_artifact["blocked_claims"] do
            raise "recent evidence artifact must block direct full-MX AUX completion"
          end

          unless "upstream_patch_migration_complete" in recent_artifact["blocked_claims"] do
            raise "recent evidence artifact must block upstream patch migration completion"
          end

          unless Enum.any?(artifact_bundle["required_commands"], &String.contains?(&1, "local_release.manifest")) do
            raise "local release artifact bundle must expose required command gates"
          end

          unless Enum.any?(artifact_bundle["required_commands"], &String.contains?(&1, "local-completion-audit.txt")) do
            raise "local release artifact bundle must expose plain completion audit archive command"
          end

          unless recent_evidence["item_count"] == 9 do
            raise "local recent evidence inventory must include closure artifact pointers"
          end

          recent_ids = Enum.map(recent_evidence["items"], & &1["id"])

          unless "direct_full_mx_aux_validation_checklist" in recent_ids do
            raise "local recent evidence inventory must include AUX validation checklist"
          end

          unless "upstream_patch_maintainer_handoff" in recent_ids do
            raise "local recent evidence inventory must include upstream maintainer handoff"
          end

          unless "upstream_patch_migration_progress" in recent_ids do
            raise "local recent evidence inventory must include upstream migration progress"
          end

          unless release["whole_project_complete?"] == false do
            raise "local release manifest must not claim whole-project completion"
          end

          unless release["policy_gates"]["routing"]["routing_claims_allowed?"] == false do
            raise "local release manifest must block routing claims"
          end
          '

      - name: Run coverage
        run: mix test --cover

      - name: Check compile-time dependency cycles
        run: mix xref graph --format cycles --label compile-connected --fail-above 0

  credo:
    name: Credo (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - run: mix deps.get
      - run: mix credo --format=oneline

  dialyzer:
    name: Dialyzer (typespec analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "28"
          elixir-version: "1.19.5"
      - uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-
      - name: Restore Dialyzer PLT cache
        uses: actions/cache@v4
        with:
          path: _build/plts
          key: ${{ runner.os }}-plt-otp28-elixir1.19.5-${{ hashFiles('**/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-plt-otp28-elixir1.19.5-
      - run: mix deps.get
      - name: Build PLTs
        run: mix dialyzer --plt
      - name: Run Dialyzer
        # `--format short` crashes in dialyxir 1.4.7 on OTP 28 with
        # {:error, :unknown_warning, :exact_compare} — the formatter
        # doesn't recognize the new warning kind. The default `dialyzer`
        # format passes through unchanged. Switch back when dialyxir
        # ships a release that knows :exact_compare.
        run: mix dialyzer --format dialyzer
