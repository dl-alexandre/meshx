name: Mob.NodeHarness

options:
  bundleIdPrefix: dev.mob
  deploymentTarget:
    iOS: "16.0"

packages:
  Mob.Node:
    path: ../..

targets:
  Mob.NodeHarness:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Mob.NodeHarness
    dependencies:
      - package: Mob.Node
        product: Mob.Node
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.mob.node.harness
        PRODUCT_NAME: Mob Mobile Harness
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSBluetoothAlwaysUsageDescription: "MeshX Mobile Harness scans for nearby MeshX BLE peers."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

schemes:
  Mob.NodeHarness:
    build:
      targets:
        Mob.NodeHarness: all
    run:
      config: Debug
